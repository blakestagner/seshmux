<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>seshmux — mission control</title>
<style>
  :root {
    --mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
    --sans: -apple-system, "SF Pro Text", "Segoe UI", sans-serif;
    --font-ui: var(--sans);
    --radius: 8px;
    --radius-sm: 6px;
    --accent-soft: color-mix(in srgb, var(--accent) 13%, transparent);
    --claude: #e8825a;
    --codex: #6cb8f0;
    --shadow: 0 1px 2px rgba(0,0,0,0.25);
  }

  /* ============ VARIANT: LEDGER — cool graphite + teal ============ */
  :root[data-variant="ledger"] { --radius: 8px; --radius-sm: 6px; }
  :root[data-variant="ledger"][data-theme="dark"] {
    color-scheme: dark;
    --bg: #0c0f13; --bg-panel: #10141a; --bg-raised: #151b23; --bg-hover: #1a212b;
    --border: #1f2833; --border-bright: #2b3644;
    --text: #dce3ea; --text-dim: #8b98a5; --text-faint: #566270;
    --accent: #2dd4bf; --accent-contrast: #06211d;
    --live: #34d399; --waiting: #fbbf24; --done: #4b5865;
    --term-bg: #0a0d11; --term-text: #c9d3dc; --term-user: #7cc0ff;
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
  }
  :root[data-variant="ledger"][data-theme="light"] {
    color-scheme: light;
    --bg: #f4f6f8; --bg-panel: #fbfcfd; --bg-raised: #ffffff; --bg-hover: #eaeef2;
    --border: #dde4ea; --border-bright: #c8d2db;
    --text: #1a232c; --text-dim: #55636f; --text-faint: #8494a1;
    --accent: #0d9488; --accent-contrast: #ffffff;
    --live: #059669; --waiting: #b45309; --done: #9aa7b2;
    --term-bg: #ffffff; --term-text: #2a3540; --term-user: #1e6fc4;
    --shadow: 0 1px 3px rgba(20,35,50,0.08);
  }

  /* ============ VARIANT: APERTURE — floating glass workspace, cobalt ============ */
  :root[data-variant="aperture"] { --radius: 16px; --radius-sm: 10px; }
  :root[data-variant="aperture"][data-theme="dark"] {
    color-scheme: dark;
    --bg: #090b0e; --bg-panel: #10141a; --bg-raised: #151b23; --bg-hover: #1a212b;
    --border: #1f2833; --border-bright: #2b3644;
    --text: #dce3ea; --text-dim: #8b98a5; --text-faint: #566270;
    --accent: #2dd4bf; --accent-contrast: #06211d;
    --live: #34d399; --waiting: #fbbf24; --done: #4b5865;
    --term-bg: #0a0d11; --term-text: #c9d3dc; --term-user: #7cc0ff;
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
  }
  :root[data-variant="aperture"][data-theme="light"] {
    color-scheme: light;
    --claude: #c75f34;
    --codex: #1e6fc4;
    --bg: #eef1f4; --bg-panel: #fbfcfd; --bg-raised: #ffffff; --bg-hover: #eaeef2;
    --border: #dde4ea; --border-bright: #c8d2db;
    --text: #1a232c; --text-dim: #55636f; --text-faint: #8494a1;
    --accent: #0d9488; --accent-contrast: #ffffff;
    --live: #059669; --waiting: #b45309; --done: #9aa7b2;
    --term-bg: #ffffff; --term-text: #2a3540; --term-user: #1e6fc4;
    --shadow: 0 8px 24px rgba(20,35,50,0.10);
  }

  /* ============ VARIANT: BASELINE — editorial ink & paper, saffron ============ */
  :root[data-variant="baseline"] { --radius: 2px; --radius-sm: 2px; }
  :root[data-variant="baseline"][data-theme="dark"] {
    color-scheme: dark;
    --bg: #101010; --bg-panel: #101010; --bg-raised: #181818; --bg-hover: #1c1c1c;
    --border: #262626; --border-bright: #3a3a3a;
    --text: #ececec; --text-dim: #9a9a9a; --text-faint: #616161;
    --accent: #ffb224; --accent-contrast: #171204;
    --live: #43c463; --waiting: #d99a2b; --done: #4a4a4a;
    --term-bg: #141414; --term-text: #d6d6d6; --term-user: #7fb2f0;
    --shadow: 0 1px 2px rgba(0,0,0,0.4);
  }
  :root[data-variant="baseline"][data-theme="light"] {
    color-scheme: light;
    --bg: #fcfcfa; --bg-panel: #fcfcfa; --bg-raised: #ffffff; --bg-hover: #f1f1ec;
    --border: #e4e4dd; --border-bright: #cfcfc5;
    --text: #191917; --text-dim: #6b6b64; --text-faint: #9d9d94;
    --accent: #a16207; --accent-contrast: #ffffff;
    --live: #15803d; --waiting: #a16207; --done: #b9b9ae;
    --term-bg: #f6f6f2; --term-text: #33332e; --term-user: #1e5fc4;
    --shadow: 0 1px 2px rgba(40,40,30,0.06);
  }

  /* ============ VARIANT: MERIDIAN — dense carbon console, magenta ============ */
  :root[data-variant="meridian"] { --radius: 4px; --radius-sm: 4px; }
  :root[data-variant="meridian"][data-theme="dark"] {
    color-scheme: dark;
    --bg: #0b0b0e; --bg-panel: #101017; --bg-raised: #16161f; --bg-hover: #1c1c28;
    --border: #23232f; --border-bright: #33334a;
    --text: #e2e2ea; --text-dim: #8f8fa3; --text-faint: #5b5b70;
    --accent: #f0439c; --accent-contrast: #ffffff;
    --live: #2fd07f; --waiting: #f5b83d; --done: #4b4b60;
    --term-bg: #09090c; --term-text: #cbcbd8; --term-user: #6db3f2;
    --shadow: 0 1px 3px rgba(0,0,0,0.45);
  }
  :root[data-variant="meridian"][data-theme="light"] {
    color-scheme: light;
    --bg: #f2f2f5; --bg-panel: #fafafc; --bg-raised: #ffffff; --bg-hover: #e9e9ef;
    --border: #dedee6; --border-bright: #c6c6d4;
    --text: #1c1c26; --text-dim: #5b5b6e; --text-faint: #8f8f9f;
    --accent: #c81e7a; --accent-contrast: #ffffff;
    --live: #0f9d58; --waiting: #a3720e; --done: #a6a6b8;
    --term-bg: #ffffff; --term-text: #2c2c3a; --term-user: #1d6fbd;
    --shadow: 0 1px 3px rgba(30,30,50,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    transition: background-color 0.2s ease, color 0.2s ease;
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

  /* ============ TOP NAV ============ */
  .topnav {
    height: 46px;
    flex: 0 0 46px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 14px;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    display: flex; align-items: center; gap: 8px;
    user-select: none;
  }
  .logo .mark {
    width: 20px; height: 20px; border-radius: var(--radius-sm);
    background: var(--accent);
    color: var(--accent-contrast);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800;
  }
  .search-wrap { position: relative; flex: 0 1 420px; }
  .search {
    width: 100%;
    height: 28px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 0 28px;
    outline: none;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--text-faint); }
  .search-icon {
    position: absolute; left: 9px; top: 7px;
    color: var(--text-faint); font-size: 12px; pointer-events: none;
  }
  .search-kbd {
    position: absolute; right: 8px; top: 6px;
    font-family: var(--mono); font-size: 10px;
    color: var(--text-faint);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 1px 4px; pointer-events: none;
  }
  .search-results {
    display: none;
    position: absolute; top: 34px; left: 0; width: 560px;
    max-height: 420px; overflow-y: auto;
    background: var(--bg-raised);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    box-shadow: 0 12px 32px rgba(0,0,0,0.35), var(--shadow);
    z-index: 200;
  }
  .search-results.open { display: block; }
  .sr-group {
    padding: 8px 12px 4px;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-faint);
  }
  .sr-item { display: block; width: 100%; text-align: left; padding: 8px 12px; border-radius: 0; }
  .sr-item:hover { background: var(--bg-hover); }
  .sr-item .sr-title { font-size: 12.5px; color: var(--text); margin-bottom: 2px; }
  .sr-item .sr-title mark { background: var(--accent-soft); color: var(--accent); border-radius: 2px; padding: 0 1px; }
  .sr-item .sr-meta { font-family: var(--mono); font-size: 10.5px; color: var(--text-faint); }
  .topnav .spacer { flex: 1; }

  .view-toggle {
    display: flex; align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .view-toggle button {
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .view-toggle button.active { background: var(--accent-soft); color: var(--accent); }
  .live-badge {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11.5px;
    color: var(--text-dim);
    padding: 4px 10px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg);
  }
  .live-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); }
  .live-badge .dot.pulse { background: var(--waiting); animation: pulse 1.4s ease-in-out infinite; }
  .gear { font-size: 15px; color: var(--text-dim); padding: 4px 6px; border-radius: var(--radius-sm); }
  .gear:hover { background: var(--bg-hover); color: var(--text); }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 color-mix(in srgb, var(--waiting) 50%, transparent); }
    50% { opacity: 0.6; box-shadow: 0 0 0 5px transparent; }
  }

  /* ============ LAYOUT ============ */
  .app { flex: 1; display: flex; min-height: 0; }

  /* ============ SIDE RAIL ============ */
  .rail {
    width: 300px; flex: 0 0 300px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    min-height: 0;
  }
  .rail-head {
    padding: 12px 14px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .rail-head h2 {
    font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-faint);
  }
  .rail-scan {
    font-family: var(--mono); font-size: 10px; color: var(--text-faint);
  }
  .rail-provfilter {
    display: flex; gap: 2px;
    margin: 0 14px 8px;
    padding: 2px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .rail-provfilter button {
    flex: 1;
    padding: 4px 0;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--text-faint);
    border-radius: calc(var(--radius-sm) - 3px);
  }
  .rail-provfilter button:hover { color: var(--text); }
  .rail-provfilter button.active {
    background: var(--bg-raised);
    color: var(--text);
    font-weight: 600;
    box-shadow: 0 0 0 1px var(--border-bright), var(--shadow);
  }
  .rail-body { flex: 1; overflow-y: auto; padding-bottom: 20px; }
  .rail-body::-webkit-scrollbar { width: 8px; }
  .rail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .proj { border-bottom: 1px solid rgba(38,38,47,0.5); }
  .proj-head {
    width: 100%;
    display: flex; align-items: center; gap: 8px;
    padding: 9px 14px;
    text-align: left;
  }
  .proj-head:hover { background: var(--bg-hover); }
  .proj-caret { color: var(--text-faint); font-size: 9px; width: 10px; transition: transform 0.15s; }
  .proj.open .proj-caret { transform: rotate(90deg); }
  .proj-name { font-weight: 600; font-size: 12.5px; flex: 1; }
  .proj-count {
    font-family: var(--mono); font-size: 10px; color: var(--text-faint);
    min-width: 14px; text-align: right;
  }
  .proj-add {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px;
    font-size: 14px; line-height: 1;
    color: var(--text-faint);
    border-radius: var(--radius-sm);
    opacity: 0; transition: opacity 0.12s;
    cursor: pointer;
  }
  .proj-head:hover .proj-add { opacity: 1; }
  .proj-add:hover { color: var(--accent); background: var(--accent-soft); }
  .proj-live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--live); }
  .pin {
    display: inline-flex; align-items: center;
    color: var(--text-faint);
    opacity: 0; transition: opacity 0.12s;
    cursor: pointer; padding: 2px;
  }
  .proj-head:hover .pin { opacity: 1; }
  .pin:hover { color: var(--text); }
  .pin.pinned { opacity: 1; color: var(--accent); }
  .tab.dragging, .proj.dragging { opacity: 0.45; }
  .tab.drag-over { box-shadow: inset 2px 0 0 var(--accent); }
  .proj.drag-over { box-shadow: inset 0 2px 0 var(--accent); }
  .proj-live-dot.waiting { background: var(--waiting); animation: pulse 1.4s infinite; }
  .proj-path {
    font-family: var(--mono); font-size: 10px; color: var(--text-faint);
    padding: 0 14px 6px 32px; display: none;
  }
  .proj.open .proj-path { display: block; }
  .proj-sessions { display: none; }
  .proj.open .proj-sessions { display: block; }

  .sess {
    width: 100%;
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 14px 7px 20px;
    text-align: left;
    border-left: 2px solid transparent;
  }
  .sess:hover { background: var(--bg-hover); }
  .sess.selected { background: var(--accent-soft); border-left-color: var(--accent); }
  .sess-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex: 0 0 8px; }
  .sess-dot.live { background: var(--live); }
  .sess-dot.waiting { background: var(--waiting); animation: pulse 1.4s infinite; }
  .sess-dot.done { background: transparent; border: 1.5px solid var(--done); }
  .sess-info { flex: 1; min-width: 0; }
  .sess-title {
    font-size: 12px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sess-meta {
    display: flex; align-items: center; gap: 6px; margin-top: 3px;
    font-family: var(--mono); font-size: 10px; color: var(--text-faint);
  }
  .sess-meta2 { justify-content: space-between; margin-top: 2px; }
  .branch-chip {
    display: inline-flex; align-items: center; gap: 3px;
    color: var(--text-dim); max-width: 130px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .proj-filter-wrap { padding: 2px 14px 4px 20px; }
  .proj-filter {
    width: 100%;
    height: 22px;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono); font-size: 11px;
    padding: 0 8px;
    outline: none;
  }
  .proj-filter:hover, .proj-filter:focus { background: var(--bg-hover); }
  .proj-filter::placeholder { color: var(--text-faint); }
  .load-more {
    display: block;
    margin: 2px 14px 6px 20px;
    padding: 3px 8px 3px 0;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--text-faint);
    text-align: left;
    background: transparent;
    border: none;
  }
  .load-more:hover { color: var(--accent); }
  .sb-actions { margin-left: auto; display: inline-flex; gap: 12px; }
  .sb-act { font-family: var(--mono); font-size: 10.5px; color: var(--text-dim); }
  .sb-act:hover { color: var(--accent); }
  .sb-tail { color: var(--text-faint); }
  .scratch-entry {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin-bottom: 10px;
    background: var(--bg-panel);
  }
  .scratch-head { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .scratch-time { font-family: var(--mono); font-size: 10px; color: var(--text-faint); margin-left: auto; }
  .scratch-note { font-size: 11.5px; color: var(--text-faint); font-style: italic; margin-top: 16px; }
  .prov {
    font-family: var(--mono); font-size: 9.5px;
    display: inline-flex; align-items: center; gap: 3px;
    flex: 0 0 auto;
    padding: 1px 6px; border-radius: 999px;
  }
  .prov-claude { color: var(--claude); background: color-mix(in srgb, var(--claude) 12%, transparent); }
  .prov-codex { color: var(--codex); background: color-mix(in srgb, var(--codex) 12%, transparent); }
  .tab .prov { font-size: 10px; }
  .term-statusbar .prov { font-size: 10.5px; }
  .tr-meta .prov { font-size: 11px; }
  .m-provider { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 14px; }
  .m-provider button { padding: 6px 14px; font-size: 12px; color: var(--text-dim); }
  .m-provider button.active { background: var(--accent-soft); color: var(--accent); }
  .usage-bar.split span { background: var(--accent); }
  .ctx { color: var(--live); font-family: var(--mono); }
  .ctx.warm { color: var(--waiting); }
  .ctx.hot { color: #e5484d; }
  .sb-ctx { display: inline-flex; align-items: center; gap: 6px; }
  .ctx-bar {
    width: 46px; height: 4px; border-radius: 2px;
    background: var(--border); overflow: hidden; display: inline-block;
  }
  .ctx-fill { display: block; height: 100%; border-radius: 2px; background: var(--live); }
  .ctx-fill.warm { background: var(--waiting); }
  .ctx-fill.hot { background: #e5484d; }
  .no-match {
    padding: 8px 14px 8px 20px;
    font-size: 11.5px; color: var(--text-faint); font-style: italic;
  }
  .new-sess {
    width: calc(100% - 34px);
    margin: 4px 14px 10px 20px;
    padding: 5px 10px;
    font-size: 11.5px; color: var(--text-dim);
    border: 1px dashed var(--border-bright);
    border-radius: var(--radius-sm);
    text-align: left;
  }
  .new-sess:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }

  /* ============ MAIN ============ */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }

  /* tab bar */
  .tabbar {
    height: 36px; flex: 0 0 36px;
    display: flex; align-items: stretch;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tabbar::-webkit-scrollbar { height: 0; }
  .tab {
    display: flex; align-items: center; gap: 7px;
    padding: 0 12px;
    border-right: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    white-space: nowrap;
    max-width: 220px;
  }
  .tab:hover { background: var(--bg-hover); }
  .tab.active { background: var(--bg); color: var(--text); box-shadow: inset 0 2px 0 var(--accent); }
  .tab .t-dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 7px; }
  .tab .t-dot.live { background: var(--live); }
  .tab .t-dot.waiting { background: var(--waiting); animation: pulse 1.4s infinite; }
  .tab .t-dot.neutral { background: var(--text-faint); opacity: 0.6; }
  .tab .t-label { overflow: hidden; text-overflow: ellipsis; }
  .tab .t-close { color: var(--text-faint); font-size: 13px; padding: 0 2px; border-radius: 3px; }
  .tab .t-close:hover { color: var(--text); background: var(--bg-hover); }

  .panes { flex: 1; position: relative; min-height: 0; background: var(--bg); }
  .pane { position: absolute; inset: 0; display: none; flex-direction: column; min-height: 0; }
  .pane.active { display: flex; }

  /* ---- fake terminal ---- */
  .term {
    flex: 1; overflow-y: auto;
    background: var(--term-bg);
    font-family: var(--mono); font-size: 12px; line-height: 1.65;
    padding: 14px 18px;
    color: var(--term-text);
    white-space: pre-wrap;
  }
  .term::-webkit-scrollbar { width: 8px; }
  .term::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .term .dim { color: var(--text-faint); }
  .term .acc { color: var(--accent); }
  .term .grn { color: var(--live); }
  .term .yel { color: var(--waiting); }
  .term .usr { color: var(--term-user); }
  .term .promptbox {
    margin-top: 10px;
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    color: var(--text-dim);
  }
  .cursor {
    display: inline-block; width: 7px; height: 14px;
    background: var(--accent); vertical-align: text-bottom;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .term-statusbar {
    flex: 0 0 26px;
    display: flex; align-items: center; gap: 14px;
    padding: 0 14px;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--text-faint);
    background: var(--bg-panel);
    border-top: 1px solid var(--border);
  }
  .term-statusbar .sb-live { color: var(--live); }
  .term-statusbar .sb-wait { color: var(--waiting); }

  /* ---- transcript viewer ---- */
  .transcript { flex: 1; overflow-y: auto; padding: 40px 0 60px; }
  .transcript::-webkit-scrollbar { width: 8px; }
  .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .tr-inner { max-width: 760px; margin: 0 auto; padding: 0 24px; }
  .tr-header {
    padding-bottom: 14px; margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .tr-header h1 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .tr-header .tr-meta {
    display: flex; gap: 12px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 11px; color: var(--text-faint);
  }
  .tr-actions { margin-top: 10px; display: flex; gap: 8px; }
  .btn {
    padding: 5px 12px; border-radius: var(--radius-sm); font-size: 12px;
    border: 1px solid var(--border-bright); color: var(--text-dim);
  }
  .btn:hover { background: var(--bg-hover); color: var(--text); }
  .btn.primary { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.1); }

  .msg { margin-bottom: 16px; }
  .msg-role {
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px;
    margin-bottom: 5px;
  }
  .msg.user .msg-role { color: #79b8ff; }
  .msg.assistant .msg-role { color: var(--accent); }
  .msg-body {
    font-size: 13px; line-height: 1.6; color: var(--text);
  }
  .msg.user .msg-body {
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
  }
  .msg-body code {
    font-family: var(--mono); font-size: 11.5px;
    background: var(--bg-raised); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 5px;
  }
  .toolcall {
    margin: 8px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
  }
  .toolcall-head {
    width: 100%;
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim);
    background: var(--bg-panel);
    text-align: left;
  }
  .toolcall-head:hover { background: var(--bg-hover); }
  .toolcall-head .tc-caret { font-size: 9px; color: var(--text-faint); transition: transform 0.15s; }
  .toolcall.open .tc-caret { transform: rotate(90deg); }
  .toolcall-head .tc-name { color: var(--accent); font-weight: 600; }
  .toolcall-body {
    display: none;
    padding: 10px 12px;
    font-family: var(--mono); font-size: 11px; line-height: 1.6;
    color: var(--text-dim);
    background: var(--bg);
    border-top: 1px solid var(--border);
    white-space: pre-wrap;
    max-height: 260px; overflow-y: auto;
  }
  .toolcall.open .toolcall-body { display: block; }

  /* ---- grid mode ---- */
  .grid-view {
    position: absolute; inset: 0;
    display: none;
    padding: 14px;
    gap: 14px;
    background: var(--bg);
    overflow-y: auto;
  }
  .grid-view.active {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    grid-auto-rows: minmax(260px, 1fr);
  }
  .grid-tile {
    display: flex; flex-direction: column;
    background: var(--bg-panel);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    min-height: 0;
    text-align: left;
  }
  .grid-tile:hover { border-color: var(--accent); transform: translateY(-1px); }
  .grid-tile.waiting { border-color: var(--waiting); animation: tile-pulse 1.6s ease-in-out infinite; }
  @keyframes tile-pulse {
    0%, 100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--waiting) 35%, transparent); }
    50% { box-shadow: 0 0 0 6px transparent; }
  }
  .grid-tile.bridged { border-color: color-mix(in srgb, var(--accent) 55%, var(--border-bright)); box-shadow: inset 0 2px 0 var(--accent); }
  .gt-from { font-family: var(--mono); font-size: 9.5px; color: var(--text-faint); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .grid-tile.highlight { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .grid-tile.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .gt-head {
    flex: 0 0 auto;
    display: flex; flex-direction: column; gap: 4px;
    padding: 8px 12px;
    background: var(--bg-raised);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .gt-row { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .gt-row .gt-flag { margin-left: auto; }
  .gt-row2 .ctx { margin-left: auto; font-size: 10px; }
  .gt-row .gt-repo { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gt-head .t-dot { width: 7px; height: 7px; border-radius: 50%; }
  .gt-head .gt-repo { font-weight: 600; }
  .gt-head .gt-branch { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .gt-head .gt-flag {
    margin-left: auto;
    font-size: 10px; font-weight: 700;
    color: var(--waiting);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .gt-term {
    flex: 1; overflow: hidden;
    font-family: var(--mono); font-size: 10.5px; line-height: 1.6;
    padding: 10px 12px;
    color: var(--text-dim);
    white-space: pre-wrap;
    mask-image: linear-gradient(to bottom, black 75%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, black 75%, transparent);
  }

  /* ---- empty state ---- */
  .empty {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; color: var(--text-faint);
  }
  .empty .mark { font-family: var(--mono); font-size: 30px; color: var(--border-bright); }

  /* ============ MODAL ============ */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none; align-items: center; justify-content: center;
    z-index: 300;
  }
  .overlay.open { display: flex; }
  .modal {
    width: 440px;
    background: var(--bg-raised);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), var(--shadow);
  }
  .modal h3 { font-size: 14px; margin-bottom: 4px; }
  .modal .m-path { font-family: var(--mono); font-size: 11px; color: var(--text-faint); margin-bottom: 16px; }
  .m-option {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    text-align: left;
  }
  .m-option:hover { border-color: var(--accent); background: var(--accent-soft); }
  .m-option .mo-icon { font-family: var(--mono); font-size: 16px; color: var(--accent); }
  .m-option .mo-title { font-size: 13px; font-weight: 600; }
  .m-option .mo-desc { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
  .m-cancel { margin-top: 6px; width: 100%; text-align: center; color: var(--text-faint); font-size: 12px; padding: 6px; }
  .m-cancel:hover { color: var(--text); }

  /* ============ TOAST ============ */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-raised);
    border: 1px solid var(--waiting);
    border-radius: var(--radius);
    padding: 12px 16px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4), var(--shadow);
    z-index: 400;
    transform: translateY(120px); opacity: 0;
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2), opacity 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast .to-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--waiting); animation: pulse 1.4s infinite; }
  .toast .to-text { font-size: 12.5px; }
  .toast .to-text strong { color: var(--waiting); }
  .toast .to-jump {
    padding: 4px 12px;
    background: var(--waiting); color: var(--accent-contrast);
    border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
  }
  .toast .to-x { color: var(--text-faint); font-size: 14px; padding: 2px 4px; }

  /* ============ SETTINGS ============ */
  .settings { flex: 1; overflow-y: auto; }
  .set-inner { max-width: 720px; margin: 0 auto; padding: 44px 24px 80px; }
  .set-h1 { font-size: 18px; font-weight: 650; margin-bottom: 18px; }
  .set-section {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .set-title {
    padding: 12px 16px 10px;
    font-size: 11px; font-weight: 650; text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--text-faint);
  }
  .set-note { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text-faint); margin-left: 6px; }
  .set-row {
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    padding: 11px 16px;
    border-top: 1px solid color-mix(in srgb, var(--border) 55%, transparent);
    font-size: 13px;
  }
  .set-label { display: flex; flex-direction: column; gap: 2px; }
  .set-sub { font-size: 11px; color: var(--text-faint); }
  .set-mono { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }
  .ok { color: var(--live); font-family: var(--mono); font-size: 12px; }
  .toggle {
    width: 34px; height: 20px; border-radius: 10px;
    background: var(--border-bright);
    position: relative; cursor: pointer; flex: 0 0 34px;
    transition: background 0.15s;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff;
    transition: transform 0.15s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(14px); }
  .set-select {
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    font: inherit; font-size: 12px; padding: 4px 8px; outline: none;
  }
  .seg { display: inline-flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .seg button { padding: 4px 12px; font-size: 12px; color: var(--text-dim); }
  .seg button:hover { background: var(--bg-hover); color: var(--text); }
  .set-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; padding: 0 16px 12px; }
  .stat { text-align: left; }
  .stat-n { font-size: 20px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .stat-l { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .usage-row { padding-top: 7px; padding-bottom: 7px; }
  .usage-row .set-label { flex: 0 0 160px; font-size: 12px; }
  .usage-bar {
    flex: 1; height: 5px; border-radius: 3px;
    background: color-mix(in srgb, var(--border) 70%, transparent);
    overflow: hidden;
  }
  .usage-bar span { display: block; height: 100%; border-radius: 3px; background: var(--accent); }
  .usage-pct { font-family: var(--mono); font-size: 11px; color: var(--text-faint); flex: 0 0 34px; text-align: right; }

  /* ==================================================================
     STRUCTURAL REDESIGNS PER VARIANT (cascade: later wins)
  ================================================================== */

  /* ---- APERTURE: floating cards, pill tabs ---- */
  [data-variant="aperture"] .app { gap: 12px; padding: 12px; }
  [data-variant="aperture"] .rail {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  [data-variant="aperture"] .main {
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    background: var(--bg-panel);
  }
  [data-variant="aperture"] .topnav { border-bottom: 1px solid var(--border); background: color-mix(in srgb, var(--bg-panel) 82%, transparent); backdrop-filter: blur(14px); }
  [data-variant="aperture"] .tabbar { height: 42px; flex: 0 0 42px; padding: 8px 8px 0; gap: 2px; align-items: stretch; border-bottom: 1px solid var(--border); }
  [data-variant="aperture"] .tab {
    border-right: none;
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    padding: 0 12px;
    border: 1px solid transparent;
    border-bottom: none;
    margin-bottom: -1px;
    position: relative;
  }
  [data-variant="aperture"] .tab.active {
    box-shadow: none;
    background: var(--bg);
    border-color: var(--border);
    color: var(--text);
    z-index: 2;
  }
  [data-variant="aperture"] .tab:not(:first-child)::before {
    content: ''; position: absolute; left: -2px; top: 50%; transform: translateY(-50%);
    width: 1px; height: 14px;
    background: color-mix(in srgb, var(--border-bright) 60%, transparent);
  }
  [data-variant="aperture"] .tab.active::before,
  [data-variant="aperture"] .tab.active + .tab::before { display: none; }
  [data-variant="aperture"] .tab.group-end { margin-left: 16px; }
  [data-variant="aperture"] .tab.group-end::before {
    content: '⇄'; display: block !important;
    width: auto; height: auto; background: none;
    left: -13px;
    color: var(--accent); font-size: 10px; font-family: var(--mono);
  }
  /* shared accent bar spanning the pair (chrome tab-group style) */
  [data-variant="aperture"] .tab.group-start,
  [data-variant="aperture"] .tab.group-end {
    box-shadow: inset 0 2px 0 var(--accent);
    border-top-color: var(--accent);
  }
  [data-variant="aperture"] .tab.group-start.active,
  [data-variant="aperture"] .tab.group-end.active {
    box-shadow: inset 0 2px 0 var(--accent);
  }
  .link-chip {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.4px;
    padding: 1px 6px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
    flex: 0 0 auto;
  }
  .link-chip.review { background: color-mix(in srgb, var(--waiting) 15%, transparent); color: var(--waiting); }
  .link-chip.planoff { background: color-mix(in srgb, var(--text-dim) 14%, transparent); color: var(--text-dim); }
  .planoff-inner { max-width: 1040px; margin: 0 auto; padding: 0 24px; }
  .planoff-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: stretch; }
  .plan-col {
    display: flex; flex-direction: column;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .plan-col:hover { border-color: var(--border-bright); }
  .plan-col-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .plan-meta { font-family: var(--mono); font-size: 10px; color: var(--text-faint); }
  .plan-angle { font-size: 12px; color: var(--text-dim); font-style: italic; margin-bottom: 10px; }
  .plan-steps { margin: 0 0 16px 18px; display: flex; flex-direction: column; gap: 8px; font-size: 12.5px; line-height: 1.5; }
  .plan-steps code { font-family: var(--mono); font-size: 11px; background: var(--bg-raised); border: 1px solid var(--border); border-radius: 4px; padding: 0 4px; }
  .plan-pick { margin-top: auto; width: 100%; }
  [data-variant="aperture"] .proj { border-bottom: none; position: relative; }
  [data-variant="aperture"] .proj::after {
    content: ''; position: absolute; left: 14px; right: 14px; bottom: 0; height: 1px;
    background: color-mix(in srgb, var(--border) 55%, transparent);
  }
  [data-variant="aperture"] .proj:last-child::after { display: none; }
  [data-variant="aperture"] .search { border-radius: 999px; }
  [data-variant="aperture"] .view-toggle { border-radius: 999px; }
  [data-variant="aperture"] .view-toggle button { padding: 5px 14px; }
  [data-variant="aperture"] .live-badge { border-radius: 999px; }
  [data-variant="aperture"] .grid-tile { box-shadow: var(--shadow); }
  [data-variant="aperture"] .sess.selected { border-left-color: transparent; border-radius: var(--radius-sm); margin: 0 6px; padding-left: 14px; width: calc(100% - 12px); }

  /* ---- BASELINE: borderless editorial, underline tabs, serif display ---- */
  [data-variant="baseline"] .topnav { background: var(--bg); }
  [data-variant="baseline"] .rail { background: var(--bg); }
  [data-variant="baseline"] .tabbar { background: var(--bg); height: 40px; flex: 0 0 40px; }
  [data-variant="baseline"] .tab { border-right: none; padding: 0 14px; }
  [data-variant="baseline"] .tab.active {
    background: transparent;
    box-shadow: inset 0 -2px 0 var(--accent);
  }
  [data-variant="baseline"] .logo { font-family: Georgia, "Times New Roman", serif; font-style: italic; font-size: 17px; letter-spacing: 0; }
  [data-variant="baseline"] .logo .mark { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); border-radius: 50%; font-style: normal; }
  [data-variant="baseline"] .search { background: transparent; border: none; border-bottom: 1px solid var(--border); border-radius: 0; padding-left: 24px; }
  [data-variant="baseline"] .search:focus { border-bottom-color: var(--accent); }
  [data-variant="baseline"] .search-kbd { border: none; }
  [data-variant="baseline"] .view-toggle { background: transparent; border: none; }
  [data-variant="baseline"] .view-toggle button.active { background: transparent; box-shadow: inset 0 -2px 0 var(--accent); color: var(--text); border-radius: 0; }
  [data-variant="baseline"] .live-badge { border: none; background: transparent; }
  [data-variant="baseline"] .proj { border-bottom: 1px solid var(--border); }
  [data-variant="baseline"] .proj-head { padding: 12px 14px; }
  [data-variant="baseline"] .proj-name { font-family: Georgia, "Times New Roman", serif; font-size: 14px; font-weight: 500; }
  [data-variant="baseline"] .proj-count { border: none; background: transparent; }
  [data-variant="baseline"] .sess.selected { background: transparent; }
  [data-variant="baseline"] .branch-chip { border: none; background: transparent; padding: 0; }
  [data-variant="baseline"] .tr-header h1 { font-family: Georgia, "Times New Roman", serif; font-size: 24px; font-weight: 500; }
  [data-variant="baseline"] .msg.user .msg-body { background: transparent; border: none; border-left: 2px solid var(--border-bright); border-radius: 0; padding: 2px 0 2px 14px; }
  [data-variant="baseline"] .term-statusbar { background: var(--bg); }
  [data-variant="baseline"] .grid-tile { box-shadow: none; }

  /* ---- MERIDIAN: dense console, status stripes, micro-labels ---- */
  [data-variant="meridian"] body { font-size: 12px; }
  [data-variant="meridian"] .topnav { height: 40px; flex: 0 0 40px; }
  [data-variant="meridian"] .tabbar { height: 30px; flex: 0 0 30px; }
  [data-variant="meridian"] .tab { font-size: 11px; padding: 0 10px; gap: 6px; }
  [data-variant="meridian"] .tab .t-dot { width: 6px; height: 6px; }
  [data-variant="meridian"] .rail { width: 272px; flex-basis: 272px; }
  [data-variant="meridian"] .rail-head { padding: 10px 14px 6px; }
  [data-variant="meridian"] .proj-head { padding: 7px 14px; }
  [data-variant="meridian"] .proj-name { text-transform: uppercase; font-size: 11px; letter-spacing: 0.6px; font-family: var(--mono); }
  [data-variant="meridian"] .sess { padding: 5px 14px 5px 13px; border-left-width: 3px; border-left-color: var(--done); }
  [data-variant="meridian"] .sess:has(.sess-dot.live) { border-left-color: var(--live); }
  [data-variant="meridian"] .sess:has(.sess-dot.waiting) { border-left-color: var(--waiting); }
  [data-variant="meridian"] .sess.selected { border-left-color: var(--accent); }
  [data-variant="meridian"] .sess-dot { display: none; }
  [data-variant="meridian"] .sess-title { font-size: 11.5px; }
  [data-variant="meridian"] .sess-meta { margin-top: 2px; font-size: 9.5px; }
  [data-variant="meridian"] .search { font-size: 11px; height: 26px; }
  [data-variant="meridian"] .gt-head { flex-basis: 28px; font-size: 11px; }
  [data-variant="meridian"] .gt-head .gt-repo { font-family: var(--mono); text-transform: uppercase; font-size: 10.5px; letter-spacing: 0.5px; }
  [data-variant="meridian"] .grid-view { gap: 8px; padding: 8px; }
  [data-variant="meridian"] .grid-tile.waiting { border-left: 3px solid var(--waiting); }
  [data-variant="meridian"] .msg-role { font-family: var(--mono); }
  [data-variant="meridian"] .term { font-size: 11.5px; }
  [data-variant="meridian"] .new-sess, [data-variant="meridian"] .load-more { font-size: 10.5px; padding: 4px 8px; }
</style>
</head>
<body>

<!-- ============ TOP NAV ============ -->
<nav class="topnav">
  <div class="logo"><span class="mark">s</span>seshmux</div>
  <div class="search-wrap">

  let list = provFilter === 'all' ? p.sessions : p.sessions.filter(x => provOf(x) === provFilter);

    return { shown: list.filter(s => s.title.toLowerCase().includes(q) || s.branch.toLowerCase().includes(q)), hidden: 0, filtered: true };

  const recent = list.filter(s => !s.old);            // last week
  const older = list.filter(s => s.old);

  return { shown: recent.concat(extra), hidden: older.length - extra.length, filtered: false };
}

        ${filtered && !shown.length ? '<div class="no-match">no matching sessions</div>' : ''}
        ${!filtered && hidden > 0 ? `<button class="load-more" onclick="loadMore('${p.id}')">${hidden} older…</button>` : ''}

}

================================================================== */
function openSession(sid) {
  const found = findSess(sid);
  if (!found) return;
  const { p, s } = found;
  const kind = (s.status === 'live' || s.status === 'waiting') ? 'term' : 'transcript';
  let tab = openTabs.find(t => t.sessId === sid);
  if (!tab) {
    tab = { id: 'tab-' + sid, kind, sessId: sid, label: kind === 'term' ? p.name : s.title, repo: p.name, status: s.status };
    openTabs.push(tab);
  }
  activeTab = tab.id;
  if (view === 'grid' && kind === 'term') {
    // stay in grid: select + scroll to the tile
    renderAll();
    gridTileClick(sid);
    const tile = document.querySelector(`.grid-tile[data-sess="${sid}"]`);
    if (tile) tile.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return;
  }
  if (view === 'grid') setView('tabs'); else renderAll();
}

function closeTab(tid, ev) {
  ev.stopPropagation();
  const i = openTabs.findIndex(t => t.id === tid);
  openTabs.splice(i, 1);
  if (activeTab === tid) activeTab = openTabs.length ? openTabs[Math.max(0, i - 1)].id : null;
  renderAll();
}

function renderTabs() {
  $('tabbar').innerHTML = openTabs.map((t, i) => {
    const dotCls = (t.kind === 'transcript' || t.kind === 'settings' || t.kind === 'scratchpad' || t.kind === 'planoff') ? 'neutral' : (t.status === 'waiting' ? 'waiting' : 'live');
    const next = openTabs[i + 1];
    const isGroupStart = next && next.linked && next.linkSrc === t.sessId;
    const isGroupEnd = t.linked && i > 0 && openTabs[i - 1].sessId === t.linkSrc;
    const kindChip = t.linked ? `<span class="link-chip ${t.linkedKind}">${t.linkedKind === 'review' ? '⊙ review' : '⇄ handoff'}</span>` : (t.kind === 'planoff' ? '<span class="link-chip planoff">⚖ plan-off</span>' : '');
    return `<button class="tab ${t.id === activeTab ? 'active' : ''} ${t.linked ? 'linked' : ''} ${isGroupStart ? 'group-start' : ''} ${isGroupEnd ? 'group-end' : ''}" draggable="true" onclick="activateTab('${t.id}')"
      ondragstart="tabDragStart(event,'${t.id}')" ondragover="tabDragOver(event,'${t.id}')"
      ondrop="tabDrop(event,'${t.id}')" ondragend="dragEnd(event)" ondragleave="dragLeave(event)">
      <span class="t-dot ${dotCls}"></span>
      ${kindChip}
      ${t.sessId && findSess(t.sessId) ? provBadge(findSess(t.sessId).s, true) : ''}
      <span class="t-label">${t.label}</span>
      <span class="t-close" onclick="closeTab('${t.id}', event)">✕</span>
    </button>`;
  }).join('');
}

/* ---- drag & drop: tabs + projects ---- */
let dragTabId = null, dragProjId = null;
function tabDragStart(e, id) { dragTabId = id; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function tabDragOver(e, id) {
  if (!dragTabId || id === dragTabId) return;
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function buildBlocks() {
  // a block = a source tab + every tab handed-off/reviewed from it; blocks move as one
  const blocks = [], used = new Set();
  for (const t of openTabs) {
    if (used.has(t.id)) continue;
    const src = t.linked ? openTabs.find(x => !x.linked && x.sessId === t.linkSrc) : t;
    const anchor = src || t;
    const members = [anchor, ...openTabs.filter(x => x.linked && anchor.sessId && x.linkSrc === anchor.sessId)];
    members.forEach(m => used.add(m.id));
    blocks.push(members);
  }
  return blocks;
}
function tabDrop(e, id) {
  e.preventDefault();
  if (!dragTabId || dragTabId === id) { dragTabId = null; renderTabs(); return; }
  const blocks = buildBlocks();
  const bi = blocks.findIndex(b => b.some(t => t.id === dragTabId));
  const ti = blocks.findIndex(b => b.some(t => t.id === id));
  if (bi < 0 || ti < 0 || bi === ti) { dragTabId = null; renderTabs(); return; }
  const [moved] = blocks.splice(bi, 1);
  blocks.splice(ti > bi ? ti - 1 : ti, 0, moved);
  openTabs = blocks.flat();
  dragTabId = null;
  renderTabs();
}
function projDragStart(e, id) {
  dragProjId = id;
  e.currentTarget.closest('.proj').classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.stopPropagation();
}
function projDragOver(e, id) {
  if (!dragProjId || id === dragProjId) return;
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}
function projDrop(e, id) {
  e.preventDefault();
  const from = projects.findIndex(p => p.id === dragProjId);
  const to = projects.findIndex(p => p.id === id);
  if (from < 0 || to < 0) return;
  // dropping across pin boundary adopts the target group's pin state
  projects[from].pinned = projects[to].pinned;
  const [m] = projects.splice(from, 1);
  projects.splice(to, 0, m);
  dragProjId = null;
  renderRail();
}
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function dragEnd(e) {
  dragTabId = dragProjId = null;
  document.querySelectorAll('.dragging, .drag-over').forEach(el => el.classList.remove('dragging', 'drag-over'));
}
function togglePin(ev, pid) {
  ev.stopPropagation();
  const p = projects.find(x => x.id === pid);
  p.pinned = !p.pinned;
  renderRail();
}
function activateTab(tid) { activeTab = tid; renderAll(); }

function renderPanes() {
  const panes = $('panes');
  panes.querySelectorAll('.pane, .empty').forEach(e => e.remove());
  if (!openTabs.length && view === 'tabs') {
    panes.insertAdjacentHTML('beforeend', `<div class="empty"><div class="mark">❯_</div><div>No open sessions — pick one from the rail, or start fresh.</div></div>`);
    return;
  }
  for (const t of openTabs) {
    let inner = '';
    if (t.kind === 'settings') {
      inner = settingsHTML();
    } else if (t.kind === 'scratchpad') {
      inner = scratchpadHTML(t.projId);
    } else if (t.kind === 'planoff') {
      inner = planoffHTML(t.projId);
    } else if (t.kind === 'term') {
      const found = findSess(t.sessId);
      const content = termContent[t.sessId] || genericTerm(t.repo);
      const sb = found && found.s.status === 'waiting'
        ? `<span class="sb-wait">⏸ waiting for input</span>`
        : `<span class="sb-live">● live</span>`;
      const ctx = found && found.s.ctx != null ? found.s.ctx : null;
      const ctxSeg = ctx == null ? '' :
        `<span class="sb-ctx"><span class="ctx-bar"><span class="ctx-fill ${ctx >= 80 ? 'hot' : ctx >= 60 ? 'warm' : ''}" style="width:${ctx}%"></span></span>ctx ${ctx}% · ${Math.round(ctx*2)}k/200k</span>`;
      const prov = found ? provBadge(found.s, true) : '';
      const other = found && provOf(found.s) === 'codex' ? 'claude' : 'codex';
      const otherGlyph = PROV[other].glyph;
      const acts = found ? `<span class="sb-actions">
          <button class="sb-act" onclick="handoffSession('${t.sessId}')" title="Compose context brief, continue in ${PROV[other].name}">⇄ hand off to ${otherGlyph} ${other}</button>
          <button class="sb-act" onclick="reviewSession('${t.sessId}')" title="Send diff to a fresh ${PROV[other].name} session for adversarial review">⊙ review with ${otherGlyph}</button>
        </span>` : '';
      inner = `<div class="term">${content}</div>
        <div class="term-statusbar">${sb}${prov}<span>tmux: seshmux-${t.repo}</span><span>⎇ ${found ? found.s.branch : 'main'}</span>${ctxSeg}${acts}<span class="sb-tail">detach-safe</span></div>`;
    } else {
      inner = renderTranscript(t.sessId);
    }
    panes.insertAdjacentHTML('beforeend', `<div class="pane ${t.id === activeTab ? 'active' : ''}" id="${t.id}">${inner}</div>`);
  }
}

function spawnBridgeSession(sid, kind) {
  const found = findSess(sid);
  if (!found) return;
  const { p, s: src } = found;
  const target = provOf(src) === 'codex' ? 'claude' : 'codex';
  const g = PROV[target].glyph;
  const nid = src.id + '-' + kind + '-' + (++newSessCounter);
  const title = (kind === 'handoff' ? 'Continuation of: ' : 'Cross-review of: ') + src.title;
  p.sessions.unshift({ id: nid, title, branch: src.branch, time: 'live now', duration: '0m', status: 'live', provider: target, ctx: 4, linkedKind: kind, linkSrc: sid });
  const banner = target === 'codex'
    ? `<span class="dim">╭──────────────────────────────────────────╮</span>\n<span class="dim">│</span> <span class="acc">⬡ Codex</span> <span class="dim">v0.34 · gpt-5.3-codex · ${p.name}</span>\n<span class="dim">╰──────────────────────────────────────────╯</span>`
    : `<span class="dim">╭──────────────────────────────────────────╮</span>\n<span class="dim">│</span> <span class="acc">✳ Claude Code</span> <span class="dim">v2.1.9 · ${p.name}</span>\n<span class="dim">╰──────────────────────────────────────────╯</span>`;
  const pr = target === 'codex' ? '›' : '❯';
  const body = kind === 'handoff'
    ? `<span class="usr">${pr} [seshmux handoff brief — from ${PROV[provOf(src)].glyph} ${provOf(src)} session]</span>
<span class="dim">  Task: ${src.title}</span>
<span class="dim">  Done so far: root cause found; fix applied; build passing</span>
<span class="dim">  Remaining: verify in browser; watch for overlay regressions</span>

<span class="acc">•</span> Brief loaded. Picking up at verification step…<span class="cursor"></span>`
    : `<span class="usr">${pr} [seshmux cross-review — diff from ${PROV[provOf(src)].glyph} ${provOf(src)} session, 2 files +14 −3]</span>

<span class="acc">•</span> Reviewing adversarially — assume the diff is wrong until proven otherwise.

<span class="dim">  └ read  scss/components/_navigation.scss</span>
<span class="dim">  └ read  scss/components/_hero.scss</span>

<span class="acc">•</span> Findings:
  <span class="yel">1. ⚠ z-index 100 collides with .modal-backdrop (z 90) — dropdown will overlay open modals. Suggest 60.</span>
  <span class="grn">2. ✓ stacking-context removal safe — no other transform dependencies found.</span>

<span class="acc">•</span> Verdict: 1 real issue, 1 pass. Posting summary to .seshmux/handoff.md…<span class="cursor"></span>`;
  termContent[nid] = banner + '\n\n' + body;
  updateLiveBadge();
  // group with source: insert tab right after the source session's tab, mark linked
  const srcIdx = openTabs.findIndex(t => t.sessId === sid);
  const tab = { id: 'tab-' + nid, kind: 'term', sessId: nid, label: p.name, repo: p.name, status: 'live', linked: true, linkedKind: kind, linkSrc: sid };
  openTabs.splice(srcIdx >= 0 ? srcIdx + 1 : openTabs.length, 0, tab);
  activeTab = tab.id;
  if (view === 'grid') setView('tabs'); else renderAll();
}

  p.sessions.unshift({ id: sid, title: 'Execute winning plan: quiz results caching refactor', branch: 'feat/quiz-cache', time: 'live now', duration: '0m', status: 'live', provider: prov, ctx: 6 });
  const banner = prov === 'codex'
    ? `<span class="dim">│</span> <span class="acc">⬡ Codex</span> <span class="dim">v0.34 · gpt-5.3-codex · ${p.name}</span>`
    : `<span class="dim">│</span> <span class="acc">✳ Claude Code</span> <span class="dim">v2.1.9 · ${p.name}</span>`;
  termContent[sid] = `<span class="dim">╭──────────────────────────────────────────╮</span>
${banner}
<span class="dim">╰──────────────────────────────────────────╯</span>

<span class="usr">${prov === 'codex' ? '›' : '❯'} [seshmux plan-off winner] Execute the approved plan (.seshmux/planoff-winner.md)</span>

<span class="acc">•</span> Plan loaded — 5 steps. Starting with step 1: extract cache layer…<span class="cursor"></span>

<div class="promptbox">${prov === 'codex' ? '›' : '❯'} <span class="cursor"></span></div>`;
  updateLiveBadge();
  openSession(sid);
}

function planoffHTML(pid) {

  const col = (prov, glyph, name, mins, steps, angle) => `
    <div class="plan-col">
      <div class="plan-col-head">

      <div class="plan-angle">${angle}</div>
      <ol class="plan-steps">${steps.map(st => `<li>${st}</li>`).join('')}</ol>

    </div>`;
  return `<div class="transcript"><div class="planoff-inner">
    <div class="tr-header">
      <h1>Plan-off</h1>
      <div class="tr-meta"><span>${p.name}</span><span>task: refactor quiz results caching to edge-safe pattern</span><span>both plans complete</span></div>
    </div>
    <div class="planoff-grid">
      ${col('claude', '✳', 'claude-opus-4-8', '2m 10s', [
        'Read current cache path: <code>inc/quiz/results-cache.php</code> + template usage',
        'Introduce <code>QuizCacheInterface</code> with transient-backed default (no behavior change)',
        'Add edge-safe key strategy: hash of quiz answers + post_modified',
        'Migrate template callers behind the interface; deprecate direct transient calls',
        'Tests: cache hit/miss/invalidations; verify on staging with WP_DEBUG'
      ], 'Conservative: interface first, zero behavior change until step 4; every step shippable.')}
      ${col('codex', '⬡', 'gpt-5.3-codex', '1m 44s', [
        'Inventory all readers/writers of quiz transients (grep sweep, 6 call sites)',
        'Replace transients with object cache + <code>wp_cache_*</code> and stampede lock',
        'Single edge-safe key fn shared by all call sites',
        'Delete legacy per-template cache branches (−120 lines)',
        'Bench before/after with wrk on staging; rollback = revert one commit'
      ], 'Aggressive: rip out transients in one pass, net-negative diff, single-commit rollback.')}
    </div>
    <div class="scratch-note">Plans ran in parallel (claude --permission-mode plan · codex read-only). Winner's plan is written to .seshmux/planoff-winner.md and seeds the execution session; the loser's plan stays in the scratchpad for reference.</div>
  </div></div>`;
}

function openScratchpad(pid) {
  const p = projects.find(x => x.id === pid);
  const tid = 'tab-scratch-' + pid;
  let tab = openTabs.find(t => t.id === tid);
  if (!tab) { tab = { id: tid, kind: 'scratchpad', projId: pid, sessId: null, label: p.name + ' · scratchpad', repo: p.name, status: null }; openTabs.push(tab); }
  activeTab = tab.id;
  if (view === 'grid') setView('tabs'); else renderAll();
}

function scratchpadHTML(pid) {
  const p = projects.find(x => x.id === pid);
  return `<div class="transcript"><div class="tr-inner">
    <div class="tr-header">
      <h1>Shared scratchpad</h1>
      <div class="tr-meta"><span>${p.path}/.seshmux/handoff.md</span><span>both agents read &amp; write this file</span></div>

      <div class="msg-body">Raised <code>.site-header</code> to z-index 100 — root cause was the stacking context from <code>translateZ(0)</code> at <code>_hero.scss:48</code>. If you touch the hero, don't re-add the transform.</div>

function fakeResume(sid) {
  const found = findSess(sid);
  if (!found) return;
  found.s.status = 'live';
  found.s.time = 'live now';
  const tab = openTabs.find(t => t.sessId === sid);
  if (tab) { tab.kind = 'term'; tab.label = found.p.name; tab.status = 'live'; }
  termContent[sid] = `<span class="dim">╭──────────────────────────────────────────╮</span>
<span class="dim">│</span> <span class="acc">✳ Claude Code</span> <span class="dim">v2.1.9 · ${found.p.name}</span>
<span class="dim">╰──────────────────────────────────────────╯</span>

<span class="dim">$ claude --resume ${sid}-uuid-would-go-here</span>

<span class="acc">●</span> Resumed session: <span class="grn">${found.s.title}</span>
<span class="dim">  Context restored — ${(transcripts[sid] ? transcripts[sid].meta[3] : '48 messages')} loaded.</span>

<div class="promptbox">❯ <span class="cursor"></span></div>`;
  updateLiveBadge();
  renderAll();
}

/* ==================================================================
   GRID VIEW
================================================================== */
function setView(v) {
  view = v;
  $('btnTabs').classList.toggle('active', v === 'tabs');
  $('btnGrid').classList.toggle('active', v === 'grid');
  renderAll();
}

function renderGrid() {
  const gv = $('gridView');
  gv.classList.toggle('active', view === 'grid');
  if (view !== 'grid') { gv.innerHTML = ''; return; }
  const flat = [];
  for (const p of projects) for (const s of p.sessions) if (s.status === 'live' || s.status === 'waiting') flat.push({ p, s });
  // keep bridge pairs adjacent: each source immediately followed by its linked sessions
  const liveSessions = [], seen = new Set();
  for (const e of flat) {
    if (seen.has(e.s.id)) continue;
    if (e.s.linkSrc && flat.some(x => x.s.id === e.s.linkSrc)) continue; // placed with its source
    liveSessions.push(e); seen.add(e.s.id);
    for (const l of flat.filter(x => x.s.linkSrc === e.s.id)) { liveSessions.push(l); seen.add(l.s.id); }
  }
  gv.innerHTML = liveSessions.map(({ p, s }) => `
    <button class="grid-tile ${s.status === 'waiting' ? 'waiting' : ''} ${s.linkedKind ? 'bridged' : ''}" data-sess="${s.id}" onclick="gridTileClick('${s.id}')">
      <div class="gt-head">
        <div class="gt-row">
          <span class="t-dot ${s.status === 'waiting' ? 'waiting' : 'live'}" style="background:${s.status === 'waiting' ? 'var(--waiting)' : 'var(--live)'}"></span>
          <span class="gt-repo">${p.name}</span>
          ${s.linkedKind ? `<span class="link-chip ${s.linkedKind}">${s.linkedKind === 'review' ? '⊙ review' : '⇄ handoff'}</span>` : ''}
          ${provBadge(s, true)}
          ${s.status === 'waiting' ? '<span class="gt-flag">needs input</span>' : ''}
        </div>
        <div class="gt-row gt-row2">
          <span class="gt-branch">⎇ ${s.branch}</span>
          ${s.linkedKind && findSess(s.linkSrc) ? `<span class="gt-from">from ${PROV[provOf(findSess(s.linkSrc).s)].glyph} ${findSess(s.linkSrc).s.title.slice(0, 24)}…</span>` : ''}
          ${ctxBadge(s)}
        </div>
      </div>
      <div class="gt-term">${(termContent[s.id] || genericTerm(p.name)).replace(/<div class="promptbox">.*?<\/div>/s, '')}</div>
    </button>`).join('');
  // hide tab panes while in grid
}
function gridTileClick(sid) {
  // Stay in grid: select the tile, make its tab active so Tabs view lands on it later.
  const found = findSess(sid);
  if (!found) return;
  let tab = openTabs.find(t => t.sessId === sid);
  if (!tab) {
    tab = { id: 'tab-' + sid, kind: 'term', sessId: sid, label: found.p.name, repo: found.p.name, status: found.s.status };
    openTabs.push(tab);
  }
  activeTab = tab.id;
  document.querySelectorAll('.grid-tile').forEach(t => t.classList.remove('selected'));
  const tile = document.querySelector(`.grid-tile[data-sess="${sid}"]`);
  if (tile) tile.classList.add('selected');
  renderRail();
  renderTabs();
}

/* ==================================================================
   SEARCH
================================================================== */
const searchIndex = [
  { q: 'z-index', proj: 'sleepfoundation-wp', sid: 'sf-1', title: 'Fix nav <mark>z-index</mark> overlapping hero on mobile', meta: 'live session · fix/nav-zindex · today' },
  { q: 'z-index', proj: 'sleepfoundation-wp', sid: 'sf-4', title: 'Refactor SCSS breakpoint mixins — touched header <mark>z-index</mark> scale', meta: 'transcript · 3d ago' },
  { q: 'pick-for-you', proj: 'sleepfoundation-wp', sid: 'sf-2', title: 'Create PR for <mark>pick-for-you</mark> block updates', meta: 'transcript · feat/pick-for-you · 2h ago' },
  { q: 'pick-for-you', proj: 'sleepapnea-wp', sid: 'sa-1', title: 'Port <mark>pick-for-you</mark> block from sleepfoundation', meta: 'live session · needs input' },
  { q: 'twig', proj: 'sleepapnea-wp', sid: 'sa-2', title: 'Fix <mark>Twig</mark> template escaping in provider cards', meta: 'transcript · 5h ago' },
  { q: 'schema', proj: 'sleepfoundation-wp', sid: 'sf-3', title: 'Audit <mark>schema</mark> markup on mattress reviews', meta: 'transcript · yesterday' },
  { q: 'websocket', proj: 'kantrail-ai', sid: 'kt-1', title: 'Debug <mark>websocket</mark> reconnect loop in agent runner', meta: 'live session · 18m' },
  { q: 'firebase', proj: 'bdr-dashboard', sid: 'bdr-1', title: 'Wire up <mark>Firebase</mark> auth to reporting views', meta: 'transcript · 6h ago' },
];

$('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  const box = $('searchResults');
  if (q.length < 2) { box.classList.remove('open'); return; }
  const hits = searchIndex.filter(h => h.q.includes(q) || h.title.toLowerCase().includes(q));
  const byProj = {};
  hits.forEach(h => (byProj[h.proj] = byProj[h.proj] || []).push(h));
  box.innerHTML = hits.length
    ? Object.entries(byProj).map(([proj, items]) => `
        <div class="sr-group">${proj}</div>
        ${items.map(h => `<button class="sr-item" onclick="searchGo('${h.sid}')">
          <div class="sr-title">${h.title}</div>
          <div class="sr-meta">${h.meta}</div>
        </button>`).join('')}`).join('')
    : `<div class="sr-group" style="padding:14px 12px">No matches — real build greps every jsonl in ~/.claude/projects/</div>`;
  box.classList.add('open');
});
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) $('searchResults').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); $('search').focus(); }
  if (e.key === 'Escape') { $('searchResults').classList.remove('open'); closeModal(); }
});
function searchGo(sid) {
  $('searchResults').classList.remove('open');
  $('search').value = '';
  const found = findSess(sid);
  if (found) { found.p.open = true; }
  openSession(sid);
}

/* ==================================================================
   NEW SESSION MODAL
================================================================== */
let modalProvider = 'claude';
function setModalProvider(prov) {
  modalProvider = prov;
  document.querySelectorAll('#modalProviderSeg button').forEach(b => b.classList.toggle('active', b.dataset.p === prov));
  const both = prov === 'both';
  $('modalNewOption').style.display = both ? 'none' : '';
  $('modalContinueOption').style.display = both ? 'none' : '';
  $('modalPlanOption').style.display = (both || prov === 'codex') ? 'none' : '';
  $('modalPlanoffOption').style.display = both ? '' : 'none';
  if (!both) {
    $('modalDescNew').textContent = prov === 'codex' ? 'codex — new conversation in this repo' : 'claude — new conversation in this repo';
    $('modalDescContinue').textContent = prov === 'codex' ? 'codex resume --last — pick up most recent session' : 'claude --continue — pick up most recent session';
  }
}
function openModal(pid) {
  modalProject = projects.find(p => p.id === pid);
  setModalProvider('claude');
  $('modalTitle').textContent = 'New session — ' + modalProject.name;
  $('modalPath').textContent = modalProject.path;
  $('modalOverlay').classList.add('open');
}
function closeModal() { $('modalOverlay').classList.remove('open'); }
function modalStart(mode) {
  closeModal();
  if (!modalProject) return;
  if (mode === 'planoff') { openPlanoff(modalProject.id); return; }
  const sid = modalProject.id + '-new-' + (++newSessCounter);
  const label = mode === 'plan' ? 'Plan mode session' : mode === 'continue' ? 'Continued session' : 'New session';
  modalProject.sessions.unshift({ id: sid, title: label + ' (just started)', branch: 'main', time: 'live now', duration: '0m', status: 'live', provider: modalProvider });
  modalProject.open = true;
  termContent[sid] = `<span class="dim">╭──────────────────────────────────────────╮</span>
<span class="dim">│</span> <span class="acc">✳ Claude Code</span> <span class="dim">v2.1.9 · ${modalProject.name}</span>
<span class="dim">╰──────────────────────────────────────────╯</span>

<span class="dim">$ tmux new-session -A -s seshmux-${modalProject.name}-${newSessCounter} && ${modalProvider === 'codex' ? 'codex' + (mode === 'continue' ? ' resume --last' : '') : 'claude' + (mode === 'continue' ? ' --continue' : mode === 'plan' ? ' --permission-mode plan' : '')}</span>

<span class="dim">Session live. Attachable from any terminal: tmux attach -t seshmux-${modalProject.name}-${newSessCounter}</span>

<div class="promptbox">❯ <span class="cursor"></span></div>`;
  updateLiveBadge();
  openSession(sid);
}

/* ==================================================================
   NOTIFICATIONS / BADGE
================================================================== */
function updateLiveBadge() {
  let live = 0, waiting = 0;
  for (const p of projects) for (const s of p.sessions) {
    if (s.status === 'live') live++;
    if (s.status === 'waiting') waiting++;
  }
  $('liveCount').textContent = `${live + waiting} live${waiting ? ' · ' + waiting + ' waiting' : ''}`;
  $('liveBadge').querySelector('.dot').className = 'dot' + (waiting ? ' pulse' : '');
}
function jumpToWaiting() {
  hideToast();
  const sa = projects.find(p => p.id === 'sa');
  sa.open = true;
  openSession('sa-1');
}
function hideToast() { $('toast').classList.remove('show'); }

/* ==================================================================
   RENDER ALL + INIT
================================================================== */
function renderAll() {
  renderRail();
  renderTabs();
  renderPanes();
  renderGrid();
  // in grid view, hide active pane so grid shows
  document.querySelectorAll('.pane').forEach(p => { if (view === 'grid') p.classList.remove('active'); });
  const emptyEl = document.querySelector('.empty');
  if (emptyEl && view === 'grid') emptyEl.remove();
}

projects[0].open = true;
projects[1].open = true;
openTabs = [
  { id: 'tab-sf-1', kind: 'term', sessId: 'sf-1', label: 'sleepfoundation-wp', repo: 'sleepfoundation-wp', status: 'live' },
  { id: 'tab-sa-1', kind: 'term', sessId: 'sa-1', label: 'sleepapnea-wp', repo: 'sleepapnea-wp', status: 'waiting' },
  { id: 'tab-sdnl-1', kind: 'term', sessId: 'sdnl-1', label: 'sd-next-library', repo: 'sd-next-library', status: 'live' },
  { id: 'tab-kt-1', kind: 'term', sessId: 'kt-1', label: 'kantrail-ai', repo: 'kantrail-ai', status: 'live' },
];
activeTab = 'tab-sf-1';
updateLiveBadge();
renderAll();

/* Toast appears after 6s to demo needs-input flow */
setTimeout(() => $('toast').classList.add('show'), 6000);
</script>
